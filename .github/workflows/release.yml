name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          generate_release_notes: true

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-22.04
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            rpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (universal)
        run: bun tauri build --target universal-apple-darwin

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build --bundles nsis

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  create-manifest:
    name: Create updater manifest
    runs-on: ubuntu-latest
    needs: [create-release, release-linux, release-macos, release-windows]

    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/${GH_REPO}/releases/download/${TAG}"

          mkdir -p sigs
          for attempt in 1 2 3; do
            if gh release download "${TAG}" --repo "${GH_REPO}" --pattern "*.sig" --dir sigs/ --clobber; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Attempt ${attempt} failed, retrying in 15s..."
              sleep 15
            fi
          done

          WIN_SIG_FILE=$(find sigs/ -name "*.exe.sig" | head -1)
          MAC_SIG_FILE=$(find sigs/ -name "*.app.tar.gz.sig" | head -1)
          LIN_SIG_FILE=$(find sigs/ -name "*.AppImage.sig" | head -1)

          if [[ -z "$WIN_SIG_FILE" || -z "$MAC_SIG_FILE" || -z "$LIN_SIG_FILE" ]]; then
            echo "ERROR: missing sig files (win='${WIN_SIG_FILE}' mac='${MAC_SIG_FILE}' lin='${LIN_SIG_FILE}')"
            ls -la sigs/
            exit 1
          fi

          WIN_FILE=$(basename "${WIN_SIG_FILE}" .sig)
          MAC_FILE=$(basename "${MAC_SIG_FILE}" .sig)
          LIN_FILE=$(basename "${LIN_SIG_FILE}" .sig)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "${WIN_SIG_FILE}")" \
            --arg mac_sig "$(cat "${MAC_SIG_FILE}")" \
            --arg lin_sig "$(cat "${LIN_SIG_FILE}")" \
            --arg win_url "${BASE}/${WIN_FILE}" \
            --arg mac_url "${BASE}/${MAC_FILE}" \
            --arg lin_url "${BASE}/${LIN_FILE}" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {signature: $win_sig, url: $win_url},
                "darwin-universal": {signature: $mac_sig, url: $mac_url},
                "linux-x86_64": {signature: $lin_sig, url: $lin_url}
              }
            }' > latest.json

      - name: Upload manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
