name: Changesets

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-or-publish:
    name: Version or tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.get-tag.outputs.published }}
      tag: ${{ steps.get-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag-release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release tag
        id: get-tag
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if git tag --list "${TAG}" | grep -q "${TAG}"; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version-or-publish
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.version-or-publish.outputs.tag }}"
          VERSION="${VERSION#v}"
          ESCAPED=$(printf '%s\n' "$VERSION" | sed 's/[.]/[.]/g')
          BODY=$(awk "/^## ${ESCAPED}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '$ s/$/\n/')
          printf 'body<<%s\n%s\n%s\n' "EOF" "$BODY" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          body: ${{ steps.changelog.outputs.body }}

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-22.04
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
            libssl-dev libgtk-3-dev libglib2.0-dev libdbus-1-dev
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
          version: 1.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          save-always: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-linux-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-linux-main,sccache-linux
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/release/bundle/deb/*.deb

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          save-always: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (universal)
        run: bun tauri build --target universal-apple-darwin
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-macos-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-macos-main,sccache-macos
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          save-always: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Strip pre-release suffix from version (MSI requires numeric-only identifiers)
        shell: pwsh
        run: |
          $raw = Get-Content src-tauri/tauri.conf.json -Raw
          $raw = $raw -replace '("version":\s*"[0-9]+\.[0-9]+\.[0-9]+)-[^"]*"', '$1"'
          Set-Content src-tauri/tauri.conf.json $raw

      - name: Build Tauri app
        run: bun tauri build
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-windows-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-windows-main,sccache-windows
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi

  create-manifest:
    name: Create updater manifest
    runs-on: ubuntu-latest
    needs: [version-or-publish, release-linux, release-macos, release-windows]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-or-publish.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/${GH_REPO}/releases/download/${TAG}"

          mkdir -p sigs
          gh release download "${TAG}" --repo "${GH_REPO}" --pattern "*.sig" --dir sigs/ || true

          WIN_SIG_FILE=$(ls sigs/*.nsis.zip.sig 2>/dev/null | head -1)
          MAC_SIG_FILE=$(ls sigs/*.app.tar.gz.sig 2>/dev/null | head -1)
          LIN_SIG_FILE=$(ls sigs/*.AppImage.tar.gz.sig 2>/dev/null | head -1)

          WIN_FILE=$(basename "${WIN_SIG_FILE}" .sig 2>/dev/null || echo "")
          MAC_FILE=$(basename "${MAC_SIG_FILE}" .sig 2>/dev/null || echo "")
          LIN_FILE=$(basename "${LIN_SIG_FILE}" .sig 2>/dev/null || echo "")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "${WIN_SIG_FILE}" 2>/dev/null || echo '')" \
            --arg mac_sig "$(cat "${MAC_SIG_FILE}" 2>/dev/null || echo '')" \
            --arg lin_sig "$(cat "${LIN_SIG_FILE}" 2>/dev/null || echo '')" \
            --arg win_url "${BASE}/${WIN_FILE}" \
            --arg mac_url "${BASE}/${MAC_FILE}" \
            --arg lin_url "${BASE}/${LIN_FILE}" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {signature: $win_sig, url: $win_url},
                "darwin-universal": {signature: $mac_sig, url: $mac_url},
                "linux-x86_64": {signature: $lin_sig, url: $lin_url}
              }
            }' > latest.json

      - name: Upload manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          files: latest.json
