name: Changesets

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-or-publish:
    name: Version or tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      tag: ${{ steps.get-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag-release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: get-tag
        if: steps.changesets.outputs.published == 'true'
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version-or-publish
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          generate_release_notes: true

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-22.04
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust stable + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (universal)
        run: bun tauri build --target universal-apple-darwin

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Strip pre-release suffix from version (MSI requires numeric-only identifiers)
        shell: pwsh
        run: |
          $raw = Get-Content src-tauri/tauri.conf.json -Raw
          $raw = $raw -replace '("version":\s*"[0-9]+\.[0-9]+\.[0-9]+)-[^"]*"', '$1"'
          Set-Content src-tauri/tauri.conf.json $raw

      - name: Build Tauri app
        run: bun tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: true
          prerelease: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
