name: Changesets

on:
  push:
    branches: [main]

concurrency:
  group: changeset-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-or-publish:
    name: Version or tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.get-tag.outputs.published }}
      tag: ${{ steps.get-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create version PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag-release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release tag
        id: get-tag
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if [[ -f ".tag-created" ]]; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version-or-publish
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.version-or-publish.outputs.tag }}"
          VERSION="${VERSION#v}"
          ESCAPED=$(printf '%s\n' "$VERSION" | sed 's/[.]/[.]/g')
          BODY=$(awk "/^## ${ESCAPED}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '$ s/$/\n/')
          printf 'body<<%s\n%s\n%s\n' "EOF" "$BODY" "EOF" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: false
          prerelease: false
          body: ${{ steps.changelog.outputs.body }}

  release-linux:
    name: Release (Linux)
    runs-on: ubuntu-22.04
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Linux system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
            libssl-dev libgtk-3-dev libglib2.0-dev libdbus-1-dev
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev rpm
          version: 1.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-linux-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-linux-main,sccache-linux
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Patch AppImage for rolling-release distros
        run: |
          # go-appimage uses versioned filenames; use gh to resolve the current name.
          gh release download continuous \
            --repo probonopd/go-appimage \
            --pattern "appimagetool-*-x86_64.AppImage" \
            --dir .
          mv appimagetool-*-x86_64.AppImage go-appimagetool.AppImage
          chmod +x go-appimagetool.AppImage

          # --appimage-extract works without FUSE (handled at the ELF runtime level).
          # Extract the go-appimage tool to get the static Go binary directly,
          # bypassing the AppImage runtime that drops args when APPIMAGE_EXTRACT_AND_RUN=1.
          ./go-appimagetool.AppImage --appimage-extract
          mv squashfs-root go-appimagetool-extracted
          APPTOOL=$(find go-appimagetool-extracted -name "appimagetool" -type f | head -1)

          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" ! -name "*.sig" | head -1)

          rm -rf squashfs-root
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract

          # Remove bundled GTK3/GLib2/Pango/Cairo so rolling-release distros use system libs
          rm -f squashfs-root/usr/lib/libgtk-3.so*
          rm -f squashfs-root/usr/lib/libgdk-3.so*
          rm -f squashfs-root/usr/lib/libgio-2.0.so*
          rm -f squashfs-root/usr/lib/libglib-2.0.so*
          rm -f squashfs-root/usr/lib/libgobject-2.0.so*
          rm -f squashfs-root/usr/lib/libgmodule-2.0.so*
          rm -f squashfs-root/usr/lib/libgthread-2.0.so*
          rm -f squashfs-root/usr/lib/libgdk_pixbuf-2.0.so*
          rm -f squashfs-root/usr/lib/libpango-1.0.so*
          rm -f squashfs-root/usr/lib/libpangocairo-1.0.so*
          rm -f squashfs-root/usr/lib/libpangoft2-1.0.so*
          rm -f squashfs-root/usr/lib/libcairo.so*
          rm -f squashfs-root/usr/lib/libcairo-gobject.so*
          rm -f squashfs-root/usr/lib/libatk-1.0.so*
          rm -f squashfs-root/usr/lib/libharfbuzz.so*

          ARCH=x86_64 "$APPTOOL" squashfs-root "$APPIMAGE"

          # Resign — patching changes the checksum so the original .sig is invalid
          bun tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$APPIMAGE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle artifacts
        run: find src-tauri/target/release/bundle -type f | sort

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  release-macos:
    name: Release (macOS)
    runs-on: macos-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (universal)
        run: bun tauri build --target universal-apple-darwin
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-macos-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-macos-main,sccache-macos
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release (Windows)
    runs-on: windows-latest
    needs: [version-or-publish, create-release]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-or-publish.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-targets: "false"
          cache-on-failure: "true"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build --bundles nsis
        env:
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_GHA_CACHE_TO: sccache-windows-${{ github.ref_name }}
          SCCACHE_GHA_CACHE_FROM: sccache-windows-main,sccache-windows
          RUSTC_WRAPPER: sccache
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle artifacts
        run: Get-ChildItem -Recurse src-tauri/target/release/bundle | Select-Object FullName
        shell: pwsh

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  create-manifest:
    name: Create updater manifest
    runs-on: ubuntu-latest
    needs: [version-or-publish, release-linux, release-macos, release-windows]
    if: needs.version-or-publish.outputs.published == 'true'
    permissions:
      contents: write

    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-or-publish.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/${GH_REPO}/releases/download/${TAG}"

          mkdir -p sigs
          # Retry up to 3 times — GitHub CDN can lag a few seconds after upload
          for attempt in 1 2 3; do
            if gh release download "${TAG}" --repo "${GH_REPO}" --pattern "*.sig" --dir sigs/ --clobber; then
              break
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Attempt ${attempt} failed, retrying in 15s..."
              sleep 15
            fi
          done

          # find avoids ls glob failures (exit 2) when no files match under pipefail
          WIN_SIG_FILE=$(find sigs/ -name "*.exe.sig" | head -1)
          MAC_SIG_FILE=$(find sigs/ -name "*.app.tar.gz.sig" | head -1)
          LIN_SIG_FILE=$(find sigs/ -name "*.AppImage.sig" | head -1)

          if [[ -z "$WIN_SIG_FILE" || -z "$MAC_SIG_FILE" || -z "$LIN_SIG_FILE" ]]; then
            echo "ERROR: missing sig files (win='${WIN_SIG_FILE}' mac='${MAC_SIG_FILE}' lin='${LIN_SIG_FILE}')"
            ls -la sigs/
            exit 1
          fi

          WIN_FILE=$(basename "${WIN_SIG_FILE}" .sig)
          MAC_FILE=$(basename "${MAC_SIG_FILE}" .sig)
          LIN_FILE=$(basename "${LIN_SIG_FILE}" .sig)

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "${WIN_SIG_FILE}")" \
            --arg mac_sig "$(cat "${MAC_SIG_FILE}")" \
            --arg lin_sig "$(cat "${LIN_SIG_FILE}")" \
            --arg win_url "${BASE}/${WIN_FILE}" \
            --arg mac_url "${BASE}/${MAC_FILE}" \
            --arg lin_url "${BASE}/${LIN_FILE}" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {signature: $win_sig, url: $win_url},
                "darwin-universal": {signature: $mac_sig, url: $mac_url},
                "linux-x86_64": {signature: $lin_sig, url: $lin_url}
              }
            }' > latest.json

          echo "Manifest:"
          cat latest.json

      - name: Upload manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-or-publish.outputs.tag }}
          files: latest.json
